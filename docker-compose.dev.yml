# Lynceus development databases — both vanilla PostgreSQL so the platform
# remains compatible with RDS/Aurora/Cloud SQL (no extensions required for
# the baseline schema). TimescaleDB is an optional production backend; not
# used here.

services:
  config-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: lynceus_config
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lynceus_config"]
      interval: 5s
      timeout: 5s
      retries: 10

  stats-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: lynceus_stats
    # pg_stat_statements is loaded so this instance can also serve as a
    # monitored target during MVP development. The stats schema itself
    # uses only native declarative range partitioning — no extensions.
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lynceus_stats"]
      interval: 5s
      timeout: 5s
      retries: 10
