# Lynceus development databases. Postgres is vanilla (RDS/Aurora/Cloud SQL
# compatible — no extensions in the baseline schema) and holds config/metadata +
# the authoritative audit log; a second Postgres stands in as the collector's
# monitored target. ClickHouse is the sole stats store per
# docs/research/2026-07-14-clickhouse-bedrock-architecture.md — the old Postgres
# stats DB was removed in ly-cwr.7/8.

services:
  config-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: lynceus_config
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres/config:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lynceus_config"]
      interval: 5s
      timeout: 5s
      retries: 10

  # The collector's dev monitored target: a stand-in "application" Postgres the
  # collector reads pg_stat_statements from. This is NOT a stats store — the
  # stats lake is ClickHouse (below). It formerly doubled as the Postgres stats
  # DB, which was removed in ly-cwr.7/8 (ClickHouse is the sole stats store).
  monitored-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: appdb
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres/app:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Dev ClickHouse stats lake. Ephemeral (no volume) — reset with `make dev-down`.
  # The token is NOT hardcoded: it comes from ${CLICKHOUSE_PASSWORD}, a random
  # per-environment secret generated by `make dev-up` into the gitignored .env and
  # shared with the app. In prod the same var is injected by the secret manager,
  # never randomly generated.
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    environment:
      CLICKHOUSE_USER: lynceus
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?run 'make dev-up' to generate a random dev token in .env}
      CLICKHOUSE_DB: lynceus_stats
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user lynceus --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
