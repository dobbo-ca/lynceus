# Lynceus development databases. The two config/stats databases are vanilla
# PostgreSQL so the platform remains compatible with RDS/Aurora/Cloud SQL (no
# extensions required for the baseline schema). TimescaleDB is an optional
# production backend; not used here. ClickHouse is the dev stats lake per
# docs/research/2026-07-14-clickhouse-bedrock-architecture.md.

services:
  config-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: lynceus_config
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lynceus_config"]
      interval: 5s
      timeout: 5s
      retries: 10

  stats-db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: lynceus_stats
    # pg_stat_statements is loaded so this instance can also serve as a
    # monitored target during MVP development. The stats schema itself
    # uses only native declarative range partitioning — no extensions.
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lynceus_stats"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Dev ClickHouse stats lake. Ephemeral (no volume) — reset with `make dev-down`.
  # The token is NOT hardcoded: it comes from ${CLICKHOUSE_PASSWORD}, a random
  # per-environment secret generated by `make dev-up` into the gitignored .env and
  # shared with the app. In prod the same var is injected by the secret manager,
  # never randomly generated.
  clickhouse:
    image: clickhouse/clickhouse-server:25.8
    environment:
      CLICKHOUSE_USER: lynceus
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?run 'make dev-up' to generate a random dev token in .env}
      CLICKHOUSE_DB: lynceus_stats
    ports:
      - "8123:8123"
      - "9000:9000"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user lynceus --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
