name: Security

# Security scanning for HITRUST-aligned controls: SAST (CodeQL, gosec),
# SCA / vuln management (govulncheck, Trivy), secret detection (gitleaks).
# See docs/GOAL-STATUS.md "Goal 4" for the control mapping.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly full scan so newly-disclosed CVEs surface even without a push.
    - cron: '17 3 * * 1'

# Least privilege by default; jobs opt into more only where required.
permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  govulncheck:
    name: govulncheck (SCA)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gosec:
    name: gosec (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run gosec
        uses: securego/gosec@master
        with:
          # SARIF for the Security tab; never fail the build on the action
          # itself so SARIF always uploads — gate severity in code review.
          args: '-no-fail -exclude-generated -fmt sarif -out gosec.sarif ./...'
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trivy:
    name: Trivy (filesystem CVE)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif
