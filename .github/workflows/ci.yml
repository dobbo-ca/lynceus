name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
          cache: true

      # Pin protoc to the version the committed generated files were stamped
      # with (libprotoc 35.0). apt's protoc is far older and would re-stamp the
      # files, failing the sync check below. protoc-gen-go and templ are pinned
      # inside the Makefile, so `make gen` is fully reproducible.
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: '35.0'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate code
        run: make gen

      # If a contributor forgot to commit regenerated proto/templ output,
      # this catches it. Generated artefacts must match their sources.
      - name: Verify generated code is in sync with sources
        run: |
          if ! git diff --quiet; then
            echo "::error::Generated files are out of sync with their sources."
            echo "Run 'make gen' locally and commit the result."
            git --no-pager diff
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -timeout 15m -race
