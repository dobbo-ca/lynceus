// Lynceus T1 wire contract.
//
// This file is the SOURCE OF TRUTH for the Lynceus privacy guarantee:
// every field on every T1 message must be a normalized identifier, a
// fingerprint, or an aggregate metric — never a per-execution literal,
// raw query sample, parameter value, or other content that could carry
// PII / PHI / customer data.
//
// Any field that *could* carry literal-bearing content belongs in a
// separate T2 message type (to be defined in its own file), gated
// behind RBAC + audit. T2 capture is opt-in per server and every read
// is recorded in the audit log.
//
// A contract test in internal/proto/lynceus/v1/contract_test.go
// enforces the literal-free invariant for QueryStat. Update the
// allowlist there whenever you legitimately add a normalized field.
syntax = "proto3";

package lynceus.v1;

option go_package = "github.com/dobbo-ca/lynceus/internal/proto/lynceus/v1;lynceusv1";

import "proto/lynceus/v1/plan.proto";

// Snapshot is the unit of telemetry transmitted by a collector for a
// single monitored Postgres server at a single point in time.
message Snapshot {
  string server_id = 1;
  int64 collected_at_unix = 2;
  repeated QueryStat query_stats = 3;

  // Per-bucket connection-state histograms from pg_stat_activity. See
  // ActivityBucket — T1, counts/labels only.
  repeated ActivityBucket activity_buckets = 4;

  // Normalized auto_explain plans extracted from the Postgres log. See
  // QueryPlan in plan.proto — T1, no literals.
  repeated QueryPlan query_plans = 5;

  // Structural schema/object inventory (schemas, tables, indexes, views,
  // functions, sequences) with sizes + stable first-seen. See SchemaObject
  // — T1, structural metadata only. Field 6 is the Layer-0 reservation;
  // 7=table_stats (ly-xqf.6), 8=log_events (ly-cxe.2) are reserved siblings.
  repeated SchemaObject schema_objects = 6;

  // Per-table size/growth + TOAST breakdown from pg_class +
  // pg_stat_user_tables. See TableStat — T1, sizes/counts/timestamps
  // only, no column values. Field 6 (schema_objects) and 8 (log_events)
  // are reserved by sibling Layer 0 beads.
  repeated TableStat table_stats = 7;
}

// QueryStat is one row of per-fingerprint query statistics, derived
// from pg_stat_statements and normalized at the collector.
//
// INVARIANT: every field below is either a stable fingerprint, a
// literal-free string, or an aggregate metric. Adding any other kind
// of field violates the T1 privacy guarantee and will fail the
// contract test.
message QueryStat {
  // Stable hash of the normalized query, suitable as a join key.
  string fingerprint = 1;

  // The query with all literals replaced by positional placeholders
  // (e.g. "SELECT * FROM users WHERE id = $1"). Produced by the
  // collector's pg_query-based normalizer. NEVER contains literal
  // values from the monitored database.
  string normalized_query = 2;

  // Aggregate metrics from pg_stat_statements.
  int64  calls            = 3;
  double total_time_ms    = 4;
  double mean_time_ms     = 5;
  int64  rows             = 6;
  int64  shared_blks_hit  = 7;
  int64  shared_blks_read = 8;
}

// ActivityBucket is a 60-second histogram bucket of pg_stat_activity samples
// for one (database, state, wait_event_type, wait_event) tuple on one server.
//
// INVARIANT: every field below is either a stable label (server, database,
// state, wait event) or an aggregate count. pg_stat_activity also exposes
// the live `query` text — Lynceus deliberately NEVER selects that column for
// T1, and no field on this message can carry it. Live query text belongs to
// the separate T2 "connection traces" feature (ly-xqf.4) and lives in its
// own message file.
//
// Aggregation: the collector samples pg_stat_activity every ~10s and folds
// the per-sample counts for each label tuple into one bucket per 60s window.
// sample_count is how many samples were folded in (expected 6 per minute,
// fewer if a sample errored). count_sum and count_max are computed over
// those samples; mean active connections in the bucket is count_sum /
// sample_count, computed at read time so the wire format is additive.
message ActivityBucket {
  string server_id          = 1;
  string database_name      = 2;  // pg_stat_activity.datname; "" for shared backends
  string state              = 3;  // active | idle | idle in transaction | idle in transaction (aborted) | fastpath function call | disabled | "" (unknown)
  string wait_event_type    = 4;  // pg_stat_activity.wait_event_type; "" if not waiting
  string wait_event         = 5;  // pg_stat_activity.wait_event;      "" if not waiting

  int64  bucket_start_unix  = 6;  // floor-of-minute UTC unix seconds
  int32  bucket_seconds     = 7;  // bucket width — currently always 60
  int32  sample_count       = 8;  // how many ~10s samples fed this bucket
  int64  count_sum          = 9;  // sum of per-sample connection counts
  int64  count_max          = 10; // peak per-sample connection count
}

// ObjectKind enumerates the schema-catalog object types Lynceus inventories.
// New kinds may be added; the wire enum is open by virtue of proto3 semantics.
enum ObjectKind {
  OBJECT_KIND_UNSPECIFIED = 0;
  OBJECT_KIND_SCHEMA      = 1;
  OBJECT_KIND_TABLE       = 2; // includes partitioned tables and materialized views
  OBJECT_KIND_INDEX       = 3;
  OBJECT_KIND_VIEW        = 4;
  OBJECT_KIND_FUNCTION    = 5;
  OBJECT_KIND_SEQUENCE    = 6;
}

// SchemaObject is one row of the monitored database's structural
// inventory. It carries STRUCTURAL metadata only — schema and relation
// names, an enum kind, a byte size, partition flags, and a first-seen
// timestamp. It NEVER carries column values, default expressions,
// constraint values, comments, or ACLs. Those are DATA-class and
// require a separate T2 message gated behind RBAC + audit.
//
// Schema NAMES themselves can be sensitive. The privacy mechanism for
// names is the collector's ignore_schema_regexp / include_schema_regexp
// filter applied BEFORE this message is constructed — not the proto.
message SchemaObject {
  ObjectKind kind     = 1;
  string schema       = 2; // namespace name
  string name         = 3; // object name within the schema (empty for kind=SCHEMA)
  string fqn          = 4; // "schema.name" — stable identifier, also empty-name-safe ("schema.")
  int64  size_bytes   = 5; // pg_total_relation_size for tables; pg_relation_size for indexes; 0 otherwise
  bool   is_partition = 6; // pg_class.relispartition — child of a partitioned parent
  string parent_fqn   = 7; // partition parent fqn, "" if none
  int64  first_seen_at_unix = 8; // stable first-seen for (server, kind, fqn) — looked up from stats DB
}

// TableStat is one per-table size/growth + TOAST/heap/index breakdown plus
// dead-tuple and vacuum/analyze metrics, sampled from pg_class +
// pg_stat_user_tables on the slow (~10m) full cadence.
//
// INVARIANT: every field is a catalog identifier (schema/name/fqn), a byte
// size counter, an aggregate row/tuple count, a vacuum/analyze counter, or a
// unix timestamp. It carries NO column value, default expression, constraint
// body, comment, ACL, proc source, MCV value, histogram bound, predicate, or
// relfrozenxid. Same privacy class as ActivityBucket (counts + labels).
message TableStat {
  string schema = 1;  // namespace IDENTIFIER (filtered at the collector boundary)
  string name   = 2;  // table IDENTIFIER
  string fqn    = 3;  // "schema.name" IDENTIFIER — join key to SchemaObject

  int64 total_bytes   = 4;  // pg_total_relation_size(oid)            [SIZE]
  int64 heap_bytes    = 5;  // pg_table_size(oid) - toast_bytes       [SIZE]
  int64 toast_bytes   = 6;  // pg_total_relation_size(reltoastrelid)  [SIZE, 0 if no TOAST]
  int64 indexes_bytes = 7;  // pg_indexes_size(oid)                   [SIZE]

  int64 row_estimate        = 8;  // GREATEST(pg_class.reltuples,0)   [COUNT]
  int64 live_tuples         = 9;  // pg_stat_user_tables.n_live_tup   [COUNT]
  int64 dead_tuples         = 10; // n_dead_tup (bloat signal)        [COUNT]
  int64 n_mod_since_analyze = 11; // [COUNT]

  int64 seq_scan = 12; // [COUNTER]
  int64 idx_scan = 13; // [COUNTER]
  int64 n_tup_ins     = 14; // [COUNTER]
  int64 n_tup_upd     = 15; // [COUNTER]
  int64 n_tup_del     = 16; // [COUNTER]
  int64 n_tup_hot_upd = 17; // [COUNTER]

  int64 last_vacuum_unix      = 18; // [TIMESTAMP, 0 if never]
  int64 last_autovacuum_unix  = 19; // [TIMESTAMP, 0 if never]
  int64 last_analyze_unix     = 20; // [TIMESTAMP, 0 if never]
  int64 last_autoanalyze_unix = 21; // [TIMESTAMP, 0 if never]
  int64 vacuum_count          = 22; // [COUNTER]
  int64 autovacuum_count      = 23; // [COUNTER]
}
